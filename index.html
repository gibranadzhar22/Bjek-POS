<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bjek - Modern POS System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f172a',
                        darkcard: '#1e293b',
                        accentneon: '#06b6d4',
                        accentblue: '#3b82f6'
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar untuk tampilan dark mode yang bersih */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #06b6d4;
        }
    </style>
</head>
<body class="bg-darkbg text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="border-b border-slate-800 bg-darkbg/80 backdrop-blur-md sticky top-0 z-40 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-gradient-to-tr from-accentblue to-accentneon p-2.5 rounded-xl shadow-[0_0_15px_rgba(6,182,212,0.4)]">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-white via-slate-200 to-accentneon bg-clip-text text-transparent">Bjek</h1>
                <p class="text-xs text-slate-400">Point of Sale System</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div id="current-time" class="text-sm font-mono text-slate-400 bg-darkcard px-3 py-1.5 rounded-lg border border-slate-800">
                00:00:00
            </div>
            <div class="flex items-center space-x-2 bg-slate-800/60 px-3 py-1.5 rounded-lg border border-slate-700">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <span class="text-xs font-medium text-slate-300">Kasir Aktif</span>
            </div>
        </div>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-3 gap-6 p-6 max-w-[1600px] w-full mx-auto">
        
        <section class="lg:col-span-2 flex flex-col space-y-4">
            <div class="flex justify-between items-center">
                <h2 class="text-lg font-bold text-slate-200 flex items-center gap-2">
                    <svg class="w-5 h-5 text-accentneon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    Daftar Menu / Produk
                </h2>
                <span class="text-xs text-slate-400 bg-slate-800 px-2.5 py-1 rounded-full border border-slate-700" id="product-count">0 Produk</span>
            </div>

            <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4 overflow-y-auto max-h-[calc(100vh-180px)] pr-2">
                </div>
        </section>

        <section class="flex flex-col bg-darkcard border border-slate-800 rounded-2xl shadow-xl overflow-hidden max-h-[calc(100vh-120px)] sticky top-24">
            <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 text-accentneon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <span class="font-bold text-slate-200">Keranjang Belanja</span>
                </div>
                <button onclick="clearCart()" class="text-xs text-rose-400 hover:text-rose-300 font-medium transition flex items-center gap-1 bg-rose-500/10 px-2.5 py-1 rounded-lg hover:bg-rose-500/20 border border-rose-500/20">
                    Clear
                </button>
            </div>

            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 min-h-[200px]">
                <div id="empty-cart-msg" class="h-full flex flex-col items-center justify-center text-slate-500 py-12 text-center">
                    <svg class="w-12 h-12 mb-2 stroke-slate-600" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                    <p class="text-sm">Belum ada item terpilih</p>
                </div>
            </div>

            <div class="p-4 border-t border-slate-800 bg-slate-900/40 space-y-4">
                <div class="space-y-2 text-sm text-slate-400">
                    <div class="flex justify-between">
                        <span>Subtotal</span>
                        <span id="summary-subtotal" class="font-mono text-slate-200">Rp 0</span>
                    </div>
                    
                    <div class="flex justify-between items-center py-1">
                        <label for="discount-input" class="text-slate-400">Diskon (%)</label>
                        <input type="number" id="discount-input" min="0" max="100" value="0" 
                            class="w-16 bg-slate-800 border border-slate-700 rounded px-2 py-1 text-right text-slate-200 font-mono focus:outline-none focus:border-accentneon">
                    </div>
                    
                    <div class="flex justify-between text-base font-bold text-slate-100 pt-2 border-t border-dashed border-slate-800">
                        <span>Total Akhir</span>
                        <span id="summary-total" class="font-mono text-accentneon text-lg">Rp 0</span>
                    </div>
                </div>

                <div class="space-y-1.5 pt-2">
                    <label for="cash-input" class="text-xs font-semibold text-slate-400 uppercase tracking-wider block">Uang Dibayar (Cash)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-2.5 text-sm font-bold text-slate-500">Rp</span>
                        <input type="number" id="cash-input" placeholder="0" 
                            class="w-full bg-slate-950 border border-slate-700 rounded-xl pl-9 pr-4 py-2.5 text-slate-100 font-mono text-lg focus:outline-none focus:border-accentblue transition shadow-inner">
                    </div>
                </div>

                <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 flex justify-between items-center">
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Kembalian</span>
                    <span id="change-display" class="font-mono text-xl font-bold text-emerald-400">Rp 0</span>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <button id="btn-reset" onclick="resetTransaction()" 
                        class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-slate-300 font-medium rounded-xl border border-slate-700 transition active:scale-95 text-sm">
                        Reset Transaksi
                    </button>
                    <button id="btn-pay" onclick="processCheckout()" 
                        class="w-full py-3 bg-gradient-to-r from-accentblue to-accentneon text-white font-bold rounded-xl shadow-[0_4px_15px_rgba(6,182,212,0.3)] hover:opacity-90 transition active:scale-95 text-sm">
                        Bayar Sekarang
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div id="success-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="bg-darkcard border border-slate-700 p-6 rounded-2xl max-w-md w-full mx-4 shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="w-16 h-16 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 class="text-center text-xl font-bold text-slate-100 mb-1">Transaksi Berhasil!</h3>
            <p class="text-center text-xs text-slate-400 mb-6">Nota transaksi telah dibuat di sistem Bjek</p>
            
            <div class="bg-slate-900 rounded-xl p-4 font-mono text-xs text-slate-300 space-y-2 border border-slate-800">
                <div class="flex justify-between"><span class="text-slate-500">Invoice:</span> <span id="modal-inv-id">#INV-0000</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Total:</span> <span id="modal-total" class="text-accentneon">Rp 0</span></div>
                <div class="flex justify-between"><span class="text-slate-500">Bayar:</span> <span id="modal-paid">Rp 0</span></div>
                <div class="flex justify-between pt-1.5 border-t border-slate-800 font-bold"><span class="text-slate-400">Kembalian:</span> <span id="modal-change" class="text-emerald-400">Rp 0</span></div>
            </div>

            <button onclick="closeModal()" class="w-full mt-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 font-semibold rounded-xl border border-slate-700 transition">
                Selesai & Tutup
            </button>
        </div>
    </div>

    <script>
        // Array Data Produk (Mudah ditambah/ubah)
        const products = [
            { id: 1, name: "Es Kopi Susu Gula Aren", price: 18000, image: "https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&q=80&w=400" },
            { id: 2, name: "Matcha Latte Premium", price: 22000, image: "https://images.unsplash.com/photo-1536256263959-770b48d82b0a?auto=format&fit=crop&q=80&w=400" },
            { id: 3, name: "Ice Americano Bold", price: 15000, image: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&q=80&w=400" },
            { id: 4, name: "Croissant Cokelat Lumer", price: 25000, image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&q=80&w=400" },
            { id: 5, name: "Red Velvet Cake Slice", price: 28000, image: "https://images.unsplash.com/photo-1616541823729-00fe0aacd32c?auto=format&fit=crop&q=80&w=400" },
            { id: 6, name: "French Fries Crispy", price: 20000, image: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&q=80&w=400" }
        ];

        // State Aplikasi Keranjang Belanja
        let cart = [];

        // Format angka mata uang Rupiah
        function formatRupiah(number) {
            return new Intl.NumberFormat("id-ID", {
                style: "currency",
                currency: "IDR",
                minimumFractionDigits: 0
            }).format(number);
        }

        // Render data produk ke sisi HTML grid
        function renderProducts() {
            const grid = document.getElementById("products-grid");
            const countSpan = document.getElementById("product-count");
            
            grid.innerHTML = "";
            countSpan.innerText = `${products.length} Menu Tersedia`;

            products.forEach(product => {
                const card = document.createElement("div");
                card.className = "bg-darkcard border border-slate-800 rounded-2xl overflow-hidden shadow-md hover:border-accentneon/40 transition-all duration-300 group flex flex-col";
                
                card.innerHTML = `
                    <div class="relative overflow-hidden h-40 bg-slate-900">
                        <img src="${product.image}" alt="${product.name}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500 opacity-80 group-hover:opacity-100">
                        <div class="absolute inset-0 bg-gradient-to-t from-darkcard via-transparent to-transparent"></div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between space-y-3">
                        <div>
                            <h3 class="font-bold text-slate-200 text-sm tracking-wide line-clamp-2">${product.name}</h3>
                            <p class="text-accentneon font-mono font-bold mt-1 text-base">${formatRupiah(product.price)}</p>
                        </div>
                        <button onclick="addToCart(${product.id})" class="w-full py-2 bg-slate-800 hover:bg-accentblue hover:text-white text-accentneon font-semibold text-xs rounded-xl transition flex items-center justify-center gap-1.5 border border-slate-700 hover:border-transparent active:scale-95">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"></path></svg>
                            Tambah
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Menambah item ke keranjang belanja
        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            const existingItem = cart.find(item => item.product.id === productId);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ product: product, quantity: 1 });
            }

            renderCart();
        }

        // Pengubah Kuantitas dari Baris Keranjang (+ atau -)
        function updateQuantity(productId, delta) {
            const item = cart.find(i => i.product.id === productId);
            if (!item) return;

            item.quantity += delta;
            
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.product.id !== productId);
            }

            renderCart();
        }

        // Hapus item spesifik
        function removeFromCart(productId) {
            cart = cart.filter(i => i.product.id !== productId);
            renderCart();
        }

        // Mengosongkan keranjang belanja saja
        function clearCart() {
            cart = [];
            renderCart();
        }

        // Kalkulasi Total, Diskon, dan Kembalian secara Otomatis
        function calculateTotals() {
            let subtotal = 0;
            cart.forEach(item => {
                subtotal += item.product.price * item.quantity;
            });

            const discountPercent = parseFloat(document.getElementById("discount-input").value) || 0;
            const discountAmount = subtotal * (discountPercent / 100);
            const total = Math.max(0, subtotal - discountAmount);

            const cashPaid = parseFloat(document.getElementById("cash-input").value) || 0;
            const change = cashPaid > total ? cashPaid - total : 0;

            // Perbarui interface DOM
            document.getElementById("summary-subtotal").innerText = formatRupiah(subtotal);
            document.getElementById("summary-total").innerText = formatRupiah(total);
            document.getElementById("change-display").innerText = formatRupiah(change);

            return { subtotal, total, cashPaid, change };
        }

        // Memperbarui UI list keranjang belanja di kolom kanan
        function renderCart() {
            const container = document.getElementById("cart-items");
            const emptyMsg = document.getElementById("empty-cart-msg");
            
            container.innerHTML = "";

            if (cart.length === 0) {
                container.appendChild(emptyMsg);
                document.getElementById("discount-input").value = 0;
                document.getElementById("cash-input").value = "";
                calculateTotals();
                return;
            }

            cart.forEach(item => {
                const itemRow = document.createElement("div");
                itemRow.className = "flex items-center justify-between p-2.5 bg-slate-900/60 border border-slate-800 rounded-xl space-x-2";
                
                itemRow.innerHTML = `
                    <div class="flex-1 min-w-0">
                        <h4 class="text-xs font-semibold text-slate-200 truncate">${item.product.name}</h4>
                        <p class="text-xs font-mono text-slate-400 mt-0.5">${formatRupiah(item.product.price)}</p>
                    </div>
                    <div class="flex items-center space-x-2 shrink-0">
                        <div class="flex items-center bg-slate-950 border border-slate-700 rounded-lg p-0.5">
                            <button onclick="updateQuantity(${item.product.id}, -1)" class="w-6 h-6 text-slate-400 hover:text-rose-400 flex items-center justify-center font-bold text-sm transition">-</button>
                            <span class="w-6 text-center font-mono text-xs text-slate-200 font-bold">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.product.id}, 1)" class="w-6 h-6 text-slate-400 hover:text-accentneon flex items-center justify-center font-bold text-sm transition">+</button>
                        </div>
                        <div class="text-right w-20 hidden sm:block">
                            <span class="text-xs font-mono font-bold text-slate-300 block">${formatRupiah(item.product.price * item.quantity)}</span>
                        </div>
                        <button onclick="removeFromCart(${item.product.id})" class="p-1 text-slate-500 hover:text-rose-400 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v6m-6 0h6"></path></svg>
                        </button>
                    </div>
                `;
                container.appendChild(itemRow);
            });

            calculateTotals();
        }

        // Pemrosesan Pembayaran / Klik Bayar
        function processCheckout() {
            if (cart.length === 0) {
                alert("Keranjang belanja kosong!");
                return;
            }

            const data = calculateTotals();

            if (data.cashPaid === 0) {
                alert("Harap masukkan uang cash tunai dari pembeli!");
                return;
            }

            if (data.cashPaid < data.total) {
                alert(`Uang tidak cukup! Dibutuhkan minimal ${formatRupiah(data.total)}`);
                return;
            }

                // Set data struk ke dalam modal kustom
            const randomInv = 'INV-' + Math.floor(1000 + Math.random() * 9000);
            document.getElementById("modal-inv-id").innerText = `#${randomInv}`;
            document.getElementById("modal-total").innerText = formatRupiah(data.total);
            document.getElementById("modal-paid").innerText = formatRupiah(data.cashPaid);
            document.getElementById("modal-change").innerText = formatRupiah(data.change);

            // Tampilkan Modal Struk Sukses
            const modal = document.getElementById("success-modal");
            modal.classList.remove("hidden");
            setTimeout(() => {
                modal.classList.remove("opacity-0");
                modal.querySelector('div').classList.remove("scale-95");
            }, 10);
        }

        // Tutup Modal & Reset Transaksi Lama
        function closeModal() {
            const modal = document.getElementById("success-modal");
            modal.classList.add("opacity-0");
            modal.querySelector('div').classList.add("scale-95");
            setTimeout(() => {
                modal.classList.add("hidden");
                resetTransaction();
            }, 300);
        }

        // Fungsi Reset Seluruh Transaksi (Tombol Reset)
        function resetTransaction() {
            document.getElementById("discount-input").value = 0;
            document.getElementById("cash-input").value = "";
            clearCart();
        }

        // Fitur Jam Jam Digital di Header
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById("current-time").innerText = timeString;
        }

        // Event Listener Real-time Input
        document.getElementById("discount-input").addEventListener("input", () => {
            let val = parseFloat(document.getElementById("discount-input").value);
            if (val < 0) document.getElementById("discount-input").value = 0;
            if (val > 100) document.getElementById("discount-input").value = 100;
            calculateTotals();
        });
        
        document.getElementById("cash-input").addEventListener("input", calculateTotals);

        // Memulai fungsi saat halaman siap
        window.onload = () => {
            renderProducts();
            setInterval(updateClock, 1000);
            updateClock();
        };
    </script>
</body>
</html>
